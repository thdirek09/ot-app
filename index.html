const BID = "appNc3QuqcZOjR6wz";
const TID = "tblWCqLeHjQ30Q5cm";
const URL0 = `https://api.airtable.com/v0/${BID}/${TID}`;
const H = {Authorization:`Bearer ${AT}`,"Content-Type":"application/json"};
const DEPTS = ["คลังสินค้า","ขนส่ง","จัดซื้อ","บัญชี","HR","IT","ฝ่ายผลิต","QC","ซ่อมบำรุง","อื่นๆ"];

const SC = {
  pending:{label:"รออนุมัติ",bg:"#FFF3CD",color:"#856404",dot:"#F59E0B"},
  approved:{label:"อนุมัติแล้ว",bg:"#D1FAE5",color:"#065F46",dot:"#10B981"},
  rejected:{label:"ไม่อนุมัติ",bg:"#FEE2E2",color:"#991B1B",dot:"#EF4444"},
};
const gid = () => "OT-"+Date.now().toString(36).toUpperCase();
const fmtD = iso => iso?new Date(iso).toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"}):"-";
const fmtDE = iso => iso?new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"-";
const fmtDT = iso => {if(!iso)return"-";const d=new Date(iso);return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});};
const tod = () => new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});

async function loadAll() {
  const r = await fetch(URL0,{headers:H});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message||"โหลดไม่สำเร็จ");
  return d.records.map(r=>({aid:r.id,...r.fields,id:r.fields.refId||r.id}));
}
async function saveRec(rec) {
  const r = await fetch(URL0,{method:"POST",headers:H,body:JSON.stringify({fields:{
    refId:rec.id, name:rec.name, empId:rec.empId, department:rec.department,
    otDate:rec.otDate, startTime:rec.startTime, endTime:rec.endTime,
    hours:parseFloat(rec.hours), reason:rec.reason, status:"pending", submittedAt:rec.submittedAt
  }})});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message||"บันทึกไม่สำเร็จ");
  return {aid:d.id,...d.fields,id:d.fields.refId||d.id};
}
async function patchRec(aid,status,adminNote) {
  const r = await fetch(`${URL0}/${aid}`,{method:"PATCH",headers:H,body:JSON.stringify({fields:{status,adminNote:adminNote||""}})});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message||"อัปเดตไม่สำเร็จ");
  return {aid:d.id,...d.fields,id:d.fields.refId||d.id};
}

    </thead>
    <tbody>
      <tr style="height:45px;">
        ${td(rec.empId||"-")}${td(rec.name||"-","text-align:left;")}${td("")}${td("0")}
        ${td(fmtDE(rec.otDate))}${td(rec.startTime||"-")}${td(rec.endTime||"-")}${td(rec.hours||"-")}
        ${td(fmtDE(rec.otDate))}${td("08.00")}${td("17.00")}${td(rec.hours||"-")}${td(rec.hours||"-")}

  <table style="width:100%;margin-top:6px;"><tr><td style="font-size:8px;color:#888;">Ref: ${rec.id||""} | ${tod()}</td></tr></table>

  document.getElementById("ot-print-content").innerHTML=html;
  document.getElementById("ot-print-form").style.display="block";

const {useState,useEffect}=React;

function Badge({status}){
  const c=SC[status]||SC.pending;
  return <span style={{background:c.bg,color:c.color,borderRadius:20,padding:"3px 12px",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:5}}>
    <span style={{width:7,height:7,borderRadius:"50%",background:c.dot,display:"inline-block"}}/>{c.label}
  </span>;
}

function Modal({children,onClose}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:24,width:"100%",maxWidth:520,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}}>
      {children}
    </div>
  </div>;
}

function Spin(){
  return <div style={{display:"flex",justifyContent:"center",padding:40}}>
    <div style={{width:36,height:36,border:"4px solid #E5E7EB",borderTop:"4px solid #0F766E",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
  </div>;
}

function Preview({form,onOk,onBack,loading}){
  return <Modal onClose={onBack}>
    <h3 style={{margin:"0 0 16px",fontSize:17,fontWeight:700}}>📋 ตรวจสอบข้อมูลก่อนส่ง</h3>
    <div style={{background:"#F9FAFB",borderRadius:10,padding:16,marginBottom:16}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 20px"}}>
        {[["ชื่อ-นามสกุล",form.name],["รหัสพนักงาน",form.empId],["แผนก",form.department],
          ["วันที่ OT",form.otDate],["เวลาเริ่ม",form.startTime],["เวลาสิ้นสุด",form.endTime],
          ["จำนวนชั่วโมง",form.hours?form.hours+" ชม.":""]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>{k}</div><div style={{fontSize:14,fontWeight:600}}>{v||"-"}</div></div>
        ))}
        <div style={{gridColumn:"1/-1"}}>
          <div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>เหตุผล</div>
          <div style={{fontSize:14,color:"#374151"}}>{form.reason||"-"}</div>
        </div>
      </div>
    </div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={onBack} style={{flex:1,background:"#F3F4F6",color:"#374151",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:600,cursor:"pointer"}}>✏️ แก้ไข</button>
      <button onClick={onOk} disabled={loading} style={{flex:1,background:loading?"#9CA3AF":"linear-gradient(135deg,#0F766E,#0D9488)",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>
        {loading?"⏳ กำลังส่ง...":"✅ ยืนยันส่งคำขอ"}
      </button>
    </div>
  </Modal>;
}

function Form({onSubmit}){
  const e0={name:"",empId:"",department:"",otDate:"",startTime:"",endTime:"",hours:"",reason:""};
  const [f,setF]=useState(e0);
  const [prev,setPrev]=useState(false);
  const [done,setDone]=useState(false);
  const [saved,setSaved]=useState(null);
  const [err,setErr]=useState("");
  const [load,setLoad]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const calcH=(s,e)=>{if(!s||!e)return"";const[sh,sm]=s.split(":").map(Number);const[eh,em]=e.split(":").map(Number);const m=(eh*60+em)-(sh*60+sm);return m<=0?"":(m/60).toFixed(1);};
  const onTime=(k,v)=>{const u={...f,[k]:v};setF({...u,hours:calcH(k==="startTime"?v:f.startTime,k==="endTime"?v:f.endTime)});};
  const onPrev=()=>{
    if(!f.name||!f.empId||!f.department||!f.otDate||!f.startTime||!f.endTime||!f.reason){setErr("กรุณากรอกข้อมูลให้ครบทุกช่อง");return;}
    if(!f.hours||parseFloat(f.hours)<=0){setErr("เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มต้น");return;}
    setErr("");setPrev(true);
  };
  const onOk=async()=>{
    setLoad(true);
    try{const rec={...f,id:gid(),submittedAt:new Date().toISOString()};const s=await onSubmit(rec);setSaved(s||rec);setPrev(false);setDone(true);setF(e0);}
    catch(e){setErr(e.message);}
    setLoad(false);
  };
  const is={width:"100%",padding:"9px 12px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:14,boxSizing:"border-box",fontFamily:"inherit"};
  const ls={display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5};
  if(done) return <div style={{textAlign:"center",padding:"30px 20px"}}>
    <div style={{fontSize:56,marginBottom:12}}>✅</div>
    <h2 style={{color:"#065F46",margin:"0 0 8px"}}>ยื่นคำขอ OT สำเร็จ!</h2>
    <p style={{color:"#6B7280",margin:"0 0 8px"}}>หมายเลขอ้างอิง:</p>
    <div style={{background:"#F0FDF4",border:"2px dashed #10B981",borderRadius:10,padding:"12px 24px",display:"inline-block",fontFamily:"monospace",fontSize:18,fontWeight:700,color:"#065F46",letterSpacing:2,marginBottom:20}}>{saved?.id}</div>
    <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
      <button onClick={()=>printForm(saved)} style={{background:"#1E3A5F",color:"#fff",border:"none",borderRadius:8,padding:"11px 20px",fontSize:14,fontWeight:600,cursor:"pointer"}}>🖨️ พิมพ์ฟอร์ม OT</button>
      <button onClick={()=>setDone(false)} style={{background:"#0F766E",color:"#fff",border:"none",borderRadius:8,padding:"11px 20px",fontSize:14,fontWeight:600,cursor:"pointer"}}>ยื่นคำขอใหม่</button>
    </div>
  </div>;
  return <div>
    {prev&&<Preview form={f} onOk={onOk} onBack={()=>setPrev(false)} loading={load}/>}
    <h2 style={{margin:"0 0 20px",fontSize:20,color:"#111827",fontWeight:700}}>📋 แบบฟอร์มขอทำ OT</h2>
    {err&&<div style={{background:"#FEE2E2",color:"#991B1B",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}>⚠️ {err}</div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
      <div style={{marginBottom:14}}><label style={ls}>ชื่อ-นามสกุล <span style={{color:"#EF4444"}}>*</span></label><input style={is} placeholder="เช่น สมชาย ใจดี" value={f.name} onChange={e=>set("name",e.target.value)}/></div>
      <div style={{marginBottom:14}}><label style={ls}>รหัสพนักงาน <span style={{color:"#EF4444"}}>*</span></label><input style={is} placeholder="เช่น EMP001" value={f.empId} onChange={e=>set("empId",e.target.value)}/></div>
    </div>
    <div style={{marginBottom:14}}><label style={ls}>แผนก <span style={{color:"#EF4444"}}>*</span></label>
      <select style={{...is,background:"#fff"}} value={f.department} onChange={e=>set("department",e.target.value)}>
        <option value="">-- เลือกแผนก --</option>{DEPTS.map(d=><option key={d} value={d}>{d}</option>)}
      </select>
    </div>
    <div style={{marginBottom:14}}><label style={ls}>วันที่ทำ OT <span style={{color:"#EF4444"}}>*</span></label><input type="date" style={is} value={f.otDate} onChange={e=>set("otDate",e.target.value)}/></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 14px"}}>
      <div style={{marginBottom:14}}><label style={ls}>เวลาเริ่ม <span style={{color:"#EF4444"}}>*</span></label><input type="time" style={is} value={f.startTime} onChange={e=>onTime("startTime",e.target.value)}/></div>
      <div style={{marginBottom:14}}><label style={ls}>เวลาสิ้นสุด <span style={{color:"#EF4444"}}>*</span></label><input type="time" style={is} value={f.endTime} onChange={e=>onTime("endTime",e.target.value)}/></div>
      <div style={{marginBottom:14}}><label style={ls}>ชั่วโมง OT</label><div style={{...is,background:"#F9FAFB",color:f.hours?"#065F46":"#9CA3AF",fontWeight:f.hours?700:400}}>{f.hours?f.hours+" ชม.":"อัตโนมัติ"}</div></div>
    </div>
    <div style={{marginBottom:14}}><label style={ls}>เหตุผลการทำ OT <span style={{color:"#EF4444"}}>*</span></label><textarea rows={3} style={{...is,resize:"vertical"}} placeholder="อธิบายเหตุผล..." value={f.reason} onChange={e=>set("reason",e.target.value)}/></div>
    <button onClick={onPrev} style={{width:"100%",background:"linear-gradient(135deg,#0F766E,#0D9488)",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:16,fontWeight:700,cursor:"pointer"}}>
      ตรวจสอบและส่งคำขอ OT →
    </button>
  </div>;
}

function Check({recs,load}){
  const [q,setQ]=useState("");
  const t=q.trim().toLowerCase();
  const res=t?recs.filter(r=>r.id?.toLowerCase()===t||r.empId?.toLowerCase()===t):[];
  return <div>
    <h2 style={{margin:"0 0 16px",fontSize:20,color:"#111827",fontWeight:700}}>🔍 ตรวจสอบสถานะ OT</h2>
    <input placeholder="ค้นหาด้วยหมายเลขอ้างอิง หรือ รหัสพนักงาน" value={q} onChange={e=>setQ(e.target.value)}
      style={{width:"100%",padding:"10px 14px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:14,boxSizing:"border-box",marginBottom:16,fontFamily:"inherit"}}/>
    {load&&<Spin/>}
    {!load&&t&&res.length===0&&<p style={{color:"#9CA3AF",textAlign:"center",padding:20}}>ไม่พบข้อมูล</p>}
    {res.map(r=><div key={r.aid} style={{border:"1.5px solid #E5E7EB",borderRadius:12,overflow:"hidden",marginBottom:12}}>
      <div style={{background:"#F9FAFB",padding:"12px 16px",borderBottom:"1px solid #E5E7EB",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontFamily:"monospace",fontWeight:700,color:"#374151"}}>{r.id}</span><Badge status={r.status}/>
      </div>
      <div style={{padding:"14px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px"}}>
        {[["ชื่อ",r.name],["รหัส",r.empId],["แผนก",r.department],["วันที่ OT",fmtD(r.otDate)],["เวลา",`${r.startTime}-${r.endTime}`],["ชั่วโมง",`${r.hours} ชม.`]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>{k}</div><div style={{fontSize:14,fontWeight:500}}>{v}</div></div>
        ))}
        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>เหตุผล</div><div style={{fontSize:14,color:"#374151"}}>{r.reason}</div></div>
        {r.adminNote&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>หมายเหตุ Admin</div><div style={{fontSize:14,fontStyle:"italic"}}>{r.adminNote}</div></div>}
      </div>
      <div style={{padding:"8px 16px",borderTop:"1px solid #E5E7EB",textAlign:"right"}}>
        <button onClick={()=>printForm(r)} style={{background:"#1E3A5F",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🖨️ พิมพ์ฟอร์ม</button>
      </div>
    </div>)}
  </div>;
}

function Admin({recs,load,onUpd}){
  const [auth,setAuth]=useState(false);
  const [pw,setPw]=useState("");const [pwe,setPwe]=useState("");
  const [fil,setFil]=useState("all");
  const [sel,setSel]=useState(null);const [note,setNote]=useState("");const [upd,setUpd]=useState(false);
  const fr=recs.filter(r=>fil==="all"||r.status===fil);
  const sm={p:recs.filter(r=>r.status==="pending").length,a:recs.filter(r=>r.status==="approved").length,r:recs.filter(r=>r.status==="rejected").length};
  const th=recs.filter(r=>r.status==="approved").reduce((s,r)=>s+(parseFloat(r.hours)||0),0);
  const doAct=async(act)=>{setUpd(true);try{await onUpd(sel.aid,act,note);setSel(null);setNote("");}catch(e){alert(e.message);}setUpd(false);};
  const csv=()=>{
    const h=["หมายเลขอ้างอิง","ชื่อ-นามสกุล","รหัสพนักงาน","แผนก","วันที่ OT","เวลาเริ่ม","เวลาสิ้นสุด","ชั่วโมง","เหตุผล","สถานะ","หมายเหตุ","วันที่ยื่น"];
    const rows=fr.map(r=>[r.id,r.name,r.empId,r.department,r.otDate,r.startTime,r.endTime,r.hours,`"${r.reason}"`,SC[r.status]?.label||r.status,r.adminNote||"",fmtDT(r.submittedAt)]);
    const c=[h,...rows].map(r=>r.join(",")).join("\n");
    const b=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=`OT_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };
  if(!auth) return <div style={{maxWidth:340,margin:"0 auto",textAlign:"center",paddingTop:20}}>
    <div style={{fontSize:48,marginBottom:8}}>🔐</div>
    <h2 style={{margin:"0 0 20px"}}>Admin Login</h2>
    <input type="password" placeholder="รหัสผ่าน" value={pw} onChange={e=>setPw(e.target.value)}
      onKeyDown={e=>e.key==="Enter"&&(pw===APW?(setAuth(true),setPwe("")):setPwe("รหัสผ่านไม่ถูกต้อง"))}
      style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:15,boxSizing:"border-box",marginBottom:8,fontFamily:"inherit"}}/>
    {pwe&&<p style={{color:"#EF4444",fontSize:13,margin:"0 0 8px"}}>{pwe}</p>}
    <button onClick={()=>pw===APW?(setAuth(true),setPwe("")):setPwe("รหัสผ่านไม่ถูกต้อง")}
      style={{width:"100%",background:"#1E3A5F",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:15,fontWeight:700,cursor:"pointer"}}>เข้าสู่ระบบ</button>
    <p style={{color:"#D1D5DB",fontSize:11,marginTop:10}}>รหัสผ่าน: admin1234</p>
  </div>;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0,fontSize:20,fontWeight:700}}>⚙️ Admin Dashboard</h2>
      <button onClick={csv} style={{background:"#065F46",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>⬇️ CSV</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
      {[["รออนุมัติ",sm.p,"#FEF3C7","#92400E"],["อนุมัติ",sm.a,"#D1FAE5","#065F46"],["ไม่อนุมัติ",sm.r,"#FEE2E2","#991B1B"],["ชม.รวม",th.toFixed(1),"#EDE9FE","#4C1D95"]].map(([l,v,bg,c])=>(
        <div key={l} style={{background:bg,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:c,fontWeight:600,opacity:0.8}}>{l}</div>
          <div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div>
        </div>
      ))}
    </div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      {[["all","ทั้งหมด"],["pending","รออนุมัติ"],["approved","อนุมัติ"],["rejected","ไม่อนุมัติ"]].map(([v,l])=>(
        <button key={v} onClick={()=>setFil(v)} style={{padding:"6px 14px",borderRadius:20,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",background:fil===v?"#0F766E":"#F3F4F6",color:fil===v?"#fff":"#374151"}}>{l}</button>
      ))}
    </div>
    {load&&<Spin/>}
    {!load&&fr.length===0&&<p style={{textAlign:"center",color:"#9CA3AF",padding:30}}>ไม่มีข้อมูล</p>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {fr.map(r=><div key={r.aid} onClick={()=>{setSel(r);setNote(r.adminNote||"");}}
        style={{border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",cursor:"pointer",background:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#374151"}}>{r.id}</span><Badge status={r.status}/>
          </div>
          <span style={{fontSize:12,color:"#9CA3AF"}}>{fmtD(r.submittedAt)}</span>
        </div>
        <div style={{fontSize:13,color:"#374151",display:"flex",gap:12,flexWrap:"wrap"}}>
          <span>👤 {r.name} ({r.empId})</span><span>🏢 {r.department}</span><span>📅 {fmtD(r.otDate)}</span><span>⏱ {r.hours} ชม.</span>
        </div>
      </div>)}
    </div>
    {sel&&<Modal onClose={()=>{setSel(null);setNote("");}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{margin:0,fontSize:16}}>รายละเอียดคำขอ OT</h3><Badge status={sel.status}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 20px",marginBottom:14,background:"#F9FAFB",padding:14,borderRadius:10}}>
        {[["ชื่อ-นามสกุล",sel.name],["รหัสพนักงาน",sel.empId],["แผนก",sel.department],["วันที่ OT",fmtD(sel.otDate)],["เวลา OT",`${sel.startTime}-${sel.endTime}`],["จำนวนชั่วโมง",`${sel.hours} ชม.`]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>{k}</div><div style={{fontSize:14,fontWeight:600}}>{v}</div></div>
        ))}
        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>เหตุผล</div><div style={{fontSize:14,color:"#374151"}}>{sel.reason}</div></div>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:13,fontWeight:600,color:"#374151",display:"block",marginBottom:5}}>หมายเหตุ Admin</label>
        <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="ระบุหมายเหตุ..."
          style={{width:"100%",padding:"9px 12px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:14,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
      </div>
      <button onClick={()=>printForm(sel)} style={{width:"100%",background:"#1E3A5F",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}}>
        🖨️ พิมพ์ฟอร์ม OT
      </button>
      {sel.status==="pending"?<div style={{display:"flex",gap:8}}>
        <button onClick={()=>doAct("approved")} disabled={upd} style={{flex:1,background:upd?"#9CA3AF":"#10B981",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:15,fontWeight:700,cursor:"pointer"}}>{upd?"⏳":"✅ อนุมัติ"}</button>
        <button onClick={()=>doAct("rejected")} disabled={upd} style={{flex:1,background:upd?"#9CA3AF":"#EF4444",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:15,fontWeight:700,cursor:"pointer"}}>{upd?"⏳":"❌ ไม่อนุมัติ"}</button>
      </div>:<div style={{display:"flex",gap:8}}>
        <button onClick={()=>doAct("pending")} style={{flex:1,background:"#F59E0B",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer"}}>↩️ คืนสถานะ</button>
        <button onClick={()=>{setSel(null);setNote("");}} style={{flex:1,background:"#F3F4F6",color:"#374151",border:"none",borderRadius:8,padding:"11px",fontSize:14,cursor:"pointer"}}>ปิด</button>
      </div>}
    </Modal>}
  </div>;
}

function App(){
  const [tab,setTab]=useState("form");
  const [recs,setRecs]=useState([]);
  const [load,setLoad]=useState(false);
  const [err,setErr]=useState("");
  const fetch0=async()=>{setLoad(true);setErr("");try{setRecs(await loadAll());}catch(e){setErr(e.message);}setLoad(false);};
  useEffect(()=>{if(tab==="check"||tab==="admin")fetch0();},[tab]);
  const onSub=async(rec)=>{const s=await saveRec(rec);setRecs(p=>[s,...p]);return s;};
  const onUpd=async(aid,status,note)=>{const u=await patchRec(aid,status,note);setRecs(p=>p.map(r=>r.aid===aid?{...r,...u}:r));};
  const tabs=[{id:"form",label:"📝 ยื่นคำขอ OT"},{id:"check",label:"🔍 ตรวจสอบ"},{id:"admin",label:"⚙️ Admin"}];
  return <div style={{fontFamily:"'Sarabun','Noto Sans Thai',sans-serif",background:"#F0F4F8",minHeight:"100vh"}}>
    <div style={{background:"linear-gradient(135deg,#0F766E 0%,#1E3A5F 100%)",padding:"20px 24px 0",boxShadow:"0 4px 20px rgba(0,0,0,0.15)"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{width:42,height:42,background:"rgba(255,255,255,0.15)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⏰</div>
          <div>
            <h1 style={{margin:0,color:"#fff",fontSize:20,fontWeight:800,lineHeight:1.2}}>ระบบบันทึก OT</h1>
            <p style={{margin:0,color:"rgba(255,255,255,0.65)",fontSize:13}}>GKN Driveline • HRM-01-001</p>
          </div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"9px 18px",border:"none",borderRadius:"8px 8px 0 0",fontSize:13,fontWeight:600,cursor:"pointer",background:tab===t.id?"#fff":"transparent",color:tab===t.id?"#0F766E":"rgba(255,255,255,0.75)"}}>
            {t.label}
          </button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:760,margin:"0 auto",padding:20}}>
      {err&&<div style={{background:"#FEE2E2",color:"#991B1B",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>⚠️ {err}</span>
        <button onClick={fetch0} style={{background:"none",border:"none",color:"#991B1B",cursor:"pointer",textDecoration:"underline",fontSize:13}}>ลองใหม่</button>
      </div>}
      <div style={{background:"#fff",borderRadius:14,padding:"24px 26px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        {tab==="form"&&<Form onSubmit={onSub}/>}
        {tab==="check"&&<Check recs={recs} load={load}/>}
        {tab==="admin"&&<Admin recs={recs} load={load} onUpd={onUpd}/>}
      </div>
      <p style={{textAlign:"center",color:"#CBD5E1",fontSize:11,marginTop:14}}>💾 GKN Driveline OT System • Airtable</p>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

const genId = () => "OT-" + Date.now().toString(36).toUpperCase();
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"}) : "-";
const fmtDateEN = iso => { if(!iso) return "-"; return new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); };
const fmtDT = iso => { if(!iso) return "-"; const d=new Date(iso); return d.toLocaleDateString("th-TH",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}); };
const today = () => new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});

async function fetchRecs() {
  const r = await fetch(`${API_URL}?sort[0][field]=submittedAt&sort[0][direction]=desc`,{headers:HEADS});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message||"โหลดไม่สำเร็จ");
  return d.records.map(r=>({airtableId:r.id,...r.fields}));
}
async function createRec(rec) {
  const r = await fetch(API_URL,{method:"POST",headers:HEADS,body:JSON.stringify({fields:{id:rec.id,name:rec.name,empId:rec.empId,department:rec.department,otDate:rec.otDate,startTime:rec.startTime,endTime:rec.endTime,hours:parseFloat(rec.hours),reason:rec.reason,status:"pending",submittedAt:rec.submittedAt}})});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message||"บันทึกไม่สำเร็จ");
  return {airtableId:d.id,...d.fields};
}
async function updateRec(aid,status,adminNote) {
  const r = await fetch(`${API_URL}/${aid}`,{method:"PATCH",headers:HEADS,body:JSON.stringify({fields:{status,adminNote:adminNote||""}})});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error?.message||"อัปเดตไม่สำเร็จ");
  return {airtableId:d.id,...d.fields};
}

function EmployeeForm({onSubmit}) {
  const empty={name:"",empId:"",department:"",otDate:"",startTime:"",endTime:"",hours:"",reason:""};
  const [form,setForm]=useState(empty);
  const [showPreview,setShowPreview]=useState(false);
  const [success,setSuccess]=useState(false);
  const [submittedRec,setSubmittedRec]=useState(null);
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const calcH=(s,e)=>{if(!s||!e)return"";const[sh,sm]=s.split(":").map(Number);const[eh,em]=e.split(":").map(Number);const m=(eh*60+em)-(sh*60+sm);return m<=0?"":(m/60).toFixed(1);};
  const handleTime=(k,v)=>{const upd={...form,[k]:v};const h=calcH(k==="startTime"?v:form.startTime,k==="endTime"?v:form.endTime);setForm({...upd,hours:h});};
  const handlePreview=()=>{
    if(!form.name||!form.empId||!form.department||!form.otDate||!form.startTime||!form.endTime||!form.reason){setError("กรุณากรอกข้อมูลให้ครบทุกช่อง");return;}
    if(!form.hours||parseFloat(form.hours)<=0){setError("เวลาสิ้นสุดต้องมากกว่าเวลาเริ่มต้น");return;}
    setError("");setShowPreview(true);
  };
  const handleConfirm=async()=>{
    setLoading(true);
    try{const id=genId();const rec={...form,id,submittedAt:new Date().toISOString()};await onSubmit(rec);setSubmittedRec(rec);setShowPreview(false);setSuccess(true);setForm(empty);}
    catch(e){setError(e.message);}
    setLoading(false);
  };
  const iStyle={width:"100%",padding:"9px 12px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:14,boxSizing:"border-box",fontFamily:"inherit"};
  const lStyle={display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5};
  if(success) return <div style={{textAlign:"center",padding:"30px 20px"}}>
    <div style={{fontSize:56,marginBottom:12}}>✅</div>
    <h2 style={{color:"#065F46",margin:"0 0 8px"}}>ยื่นคำขอ OT สำเร็จ!</h2>
    <p style={{color:"#6B7280",margin:"0 0 8px"}}>หมายเลขอ้างอิง:</p>
    <div style={{background:"#F0FDF4",border:"2px dashed #10B981",borderRadius:10,padding:"12px 24px",display:"inline-block",fontFamily:"monospace",fontSize:18,fontWeight:700,color:"#065F46",letterSpacing:2,marginBottom:20}}>{submittedRec?.id}</div>
    <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
      <button onClick={()=>printOTForm(submittedRec)} style={{background:"#1E3A5F",color:"#fff",border:"none",borderRadius:8,padding:"11px 20px",fontSize:14,fontWeight:600,cursor:"pointer"}}>🖨️ พิมพ์ฟอร์ม OT</button>
      <button onClick={()=>setSuccess(false)} style={{background:"#0F766E",color:"#fff",border:"none",borderRadius:8,padding:"11px 20px",fontSize:14,fontWeight:600,cursor:"pointer"}}>ยื่นคำขอใหม่</button>
    </div>
  </div>;
  return <div>
    {showPreview&&<PreviewModal form={form} onConfirm={handleConfirm} onEdit={()=>setShowPreview(false)} loading={loading}/>}
    <h2 style={{margin:"0 0 20px",fontSize:20,color:"#111827",fontWeight:700}}>📋 แบบฟอร์มขอทำ OT</h2>
    {error&&<div style={{background:"#FEE2E2",color:"#991B1B",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}>⚠️ {error}</div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
      <div style={{marginBottom:14}}><label style={lStyle}>ชื่อ-นามสกุล <span style={{color:"#EF4444"}}>*</span></label><input style={iStyle} placeholder="เช่น สมชาย ใจดี" value={form.name} onChange={e=>set("name",e.target.value)}/></div>
      <div style={{marginBottom:14}}><label style={lStyle}>รหัสพนักงาน <span style={{color:"#EF4444"}}>*</span></label><input style={iStyle} placeholder="เช่น EMP001" value={form.empId} onChange={e=>set("empId",e.target.value)}/></div>
    </div>
    <div style={{marginBottom:14}}><label style={lStyle}>แผนก <span style={{color:"#EF4444"}}>*</span></label>
      <select style={{...iStyle,background:"#fff"}} value={form.department} onChange={e=>set("department",e.target.value)}>
        <option value="">-- เลือกแผนก --</option>{DEPTS.map(d=><option key={d} value={d}>{d}</option>)}
      </select>
    </div>
    <div style={{marginBottom:14}}><label style={lStyle}>วันที่ทำ OT <span style={{color:"#EF4444"}}>*</span></label><input type="date" style={iStyle} value={form.otDate} onChange={e=>set("otDate",e.target.value)}/></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 14px"}}>
      <div style={{marginBottom:14}}><label style={lStyle}>เวลาเริ่ม <span style={{color:"#EF4444"}}>*</span></label><input type="time" style={iStyle} value={form.startTime} onChange={e=>handleTime("startTime",e.target.value)}/></div>
      <div style={{marginBottom:14}}><label style={lStyle}>เวลาสิ้นสุด <span style={{color:"#EF4444"}}>*</span></label><input type="time" style={iStyle} value={form.endTime} onChange={e=>handleTime("endTime",e.target.value)}/></div>
      <div style={{marginBottom:14}}><label style={lStyle}>ชั่วโมง OT</label><div style={{...iStyle,background:"#F9FAFB",color:form.hours?"#065F46":"#9CA3AF",fontWeight:form.hours?700:400}}>{form.hours?`${form.hours} ชม.`:"อัตโนมัติ"}</div></div>
    </div>
    <div style={{marginBottom:14}}><label style={lStyle}>เหตุผลการทำ OT <span style={{color:"#EF4444"}}>*</span></label><textarea rows={3} style={{...iStyle,resize:"vertical"}} placeholder="อธิบายเหตุผล..." value={form.reason} onChange={e=>set("reason",e.target.value)}/></div>
    <button onClick={handlePreview} style={{width:"100%",background:"linear-gradient(135deg,#0F766E,#0D9488)",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:16,fontWeight:700,cursor:"pointer"}}>
      ตรวจสอบและส่งคำขอ OT →
    </button>
  </div>;
}

function StatusCheck({records,loading}) {
  const [search,setSearch]=useState("");
  const t=search.trim().toLowerCase();
  const results=t?records.filter(r=>r.id?.toLowerCase()===t||r.empId?.toLowerCase()===t):[];
  return <div>
    <h2 style={{margin:"0 0 16px",fontSize:20,color:"#111827",fontWeight:700}}>🔍 ตรวจสอบสถานะ OT</h2>
    <input placeholder="ค้นหาด้วยหมายเลขอ้างอิง หรือ รหัสพนักงาน" value={search} onChange={e=>setSearch(e.target.value)}
      style={{width:"100%",padding:"10px 14px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:14,boxSizing:"border-box",marginBottom:16,fontFamily:"inherit"}}/>
    {loading&&<Spinner/>}
    {!loading&&t&&results.length===0&&<p style={{color:"#9CA3AF",textAlign:"center",padding:20}}>ไม่พบข้อมูล</p>}
    {results.map(r=><div key={r.airtableId} style={{border:"1.5px solid #E5E7EB",borderRadius:12,overflow:"hidden",marginBottom:12}}>
      <div style={{background:"#F9FAFB",padding:"12px 16px",borderBottom:"1px solid #E5E7EB",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontFamily:"monospace",fontWeight:700,color:"#374151"}}>{r.id}</span><Badge status={r.status}/>
      </div>
      <div style={{padding:"14px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px"}}>
        {[["ชื่อ",r.name],["รหัส",r.empId],["แผนก",r.department],["วันที่ OT",fmtDate(r.otDate)],["เวลา",`${r.startTime}-${r.endTime}`],["ชั่วโมง",`${r.hours} ชม.`]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>{k}</div><div style={{fontSize:14,fontWeight:500,color:"#111827"}}>{v}</div></div>
        ))}
        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>เหตุผล</div><div style={{fontSize:14,color:"#374151"}}>{r.reason}</div></div>
        {r.adminNote&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>หมายเหตุ Admin</div><div style={{fontSize:14,color:"#374151",fontStyle:"italic"}}>{r.adminNote}</div></div>}
      </div>
      <div style={{padding:"8px 16px",borderTop:"1px solid #E5E7EB",textAlign:"right"}}>
        <button onClick={()=>printOTForm(r)} style={{background:"#1E3A5F",color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🖨️ พิมพ์ฟอร์ม OT</button>
      </div>
    </div>)}
  </div>;
}

function AdminPanel({records,loading,onUpdate}) {
  const [authed,setAuthed]=useState(false);
  const [pw,setPw]=useState("");const [pwErr,setPwErr]=useState("");
  const [filter,setFilter]=useState("all");
  const [sel,setSel]=useState(null);const [note,setNote]=useState("");const [upd,setUpd]=useState(false);
  const filtered=records.filter(r=>filter==="all"||r.status===filter);
  const sum={pending:records.filter(r=>r.status==="pending").length,approved:records.filter(r=>r.status==="approved").length,rejected:records.filter(r=>r.status==="rejected").length};
  const totalH=records.filter(r=>r.status==="approved").reduce((s,r)=>s+(parseFloat(r.hours)||0),0);
  const doAction=async(action)=>{setUpd(true);try{await onUpdate(sel.airtableId,action,note);setSel(null);setNote("");}catch(e){alert("เกิดข้อผิดพลาด: "+e.message);}setUpd(false);};
  const dlCSV=()=>{
    const h=["หมายเลขอ้างอิง","ชื่อ-นามสกุล","รหัสพนักงาน","แผนก","วันที่ OT","เวลาเริ่ม","เวลาสิ้นสุด","ชั่วโมง","เหตุผล","สถานะ","หมายเหตุ Admin","วันที่ยื่น"];
    const rows=filtered.map(r=>[r.id,r.name,r.empId,r.department,r.otDate,r.startTime,r.endTime,r.hours,`"${r.reason}"`,SC[r.status]?.label||r.status,r.adminNote||"",fmtDT(r.submittedAt)]);
    const csv=[h,...rows].map(r=>r.join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`OT_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };
  if(!authed) return <div style={{maxWidth:340,margin:"0 auto",textAlign:"center",paddingTop:20}}>
    <div style={{fontSize:48,marginBottom:8}}>🔐</div>
    <h2 style={{margin:"0 0 20px",color:"#111827"}}>Admin Login</h2>
    <input type="password" placeholder="รหัสผ่าน" value={pw} onChange={e=>setPw(e.target.value)}
      onKeyDown={e=>e.key==="Enter"&&(pw===ADMIN_PW?(setAuthed(true),setPwErr("")):setPwErr("รหัสผ่านไม่ถูกต้อง"))}
      style={{width:"100%",padding:"11px 14px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:15,boxSizing:"border-box",marginBottom:8,fontFamily:"inherit"}}/>
    {pwErr&&<p style={{color:"#EF4444",fontSize:13,margin:"0 0 8px"}}>{pwErr}</p>}
    <button onClick={()=>pw===ADMIN_PW?(setAuthed(true),setPwErr("")):setPwErr("รหัสผ่านไม่ถูกต้อง")}
      style={{width:"100%",background:"#1E3A5F",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:15,fontWeight:700,cursor:"pointer"}}>เข้าสู่ระบบ</button>
    <p style={{color:"#D1D5DB",fontSize:11,marginTop:10}}>รหัสผ่าน: admin1234</p>
  </div>;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0,fontSize:20,color:"#111827",fontWeight:700}}>⚙️ Admin Dashboard</h2>
      <button onClick={dlCSV} style={{background:"#065F46",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>⬇️ CSV</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
      {[["รออนุมัติ",sum.pending,"#FEF3C7","#92400E"],["อนุมัติ",sum.approved,"#D1FAE5","#065F46"],["ไม่อนุมัติ",sum.rejected,"#FEE2E2","#991B1B"],["ชม.รวม",totalH.toFixed(1),"#EDE9FE","#4C1D95"]].map(([l,v,bg,col])=>(
        <div key={l} style={{background:bg,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:col,fontWeight:600,opacity:0.8}}>{l}</div>
          <div style={{fontSize:22,fontWeight:800,color:col}}>{v}</div>
        </div>
      ))}
    </div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      {[["all","ทั้งหมด"],["pending","รออนุมัติ"],["approved","อนุมัติ"],["rejected","ไม่อนุมัติ"]].map(([v,l])=>(
        <button key={v} onClick={()=>setFilter(v)} style={{padding:"6px 14px",borderRadius:20,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",background:filter===v?"#0F766E":"#F3F4F6",color:filter===v?"#fff":"#374151"}}>{l}</button>
      ))}
    </div>
    {loading&&<Spinner/>}
    {!loading&&filtered.length===0&&<p style={{textAlign:"center",color:"#9CA3AF",padding:30}}>ไม่มีข้อมูล</p>}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {filtered.map(r=><div key={r.airtableId} onClick={()=>{setSel(r);setNote(r.adminNote||"");}}
        style={{border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px",cursor:"pointer",background:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:"#374151"}}>{r.id}</span>
            <Badge status={r.status}/>
          </div>
          <span style={{fontSize:12,color:"#9CA3AF"}}>{fmtDate(r.submittedAt)}</span>
        </div>
        <div style={{fontSize:13,color:"#374151",display:"flex",gap:12,flexWrap:"wrap"}}>
          <span>👤 {r.name} ({r.empId})</span><span>🏢 {r.department}</span><span>📅 {fmtDate(r.otDate)}</span><span>⏱ {r.hours} ชม.</span>
        </div>
      </div>)}
    </div>
    {sel&&<Modal onClose={()=>{setSel(null);setNote("");}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h3 style={{margin:0,fontSize:16}}>รายละเอียดคำขอ OT</h3><Badge status={sel.status}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 20px",marginBottom:14,background:"#F9FAFB",padding:14,borderRadius:10}}>
        {[["ชื่อ-นามสกุล",sel.name],["รหัสพนักงาน",sel.empId],["แผนก",sel.department],["วันที่ OT",fmtDate(sel.otDate)],["เวลา OT",`${sel.startTime}-${sel.endTime}`],["จำนวนชั่วโมง",`${sel.hours} ชม.`]].map(([k,v])=>(
          <div key={k}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>{k}</div><div style={{fontSize:14,fontWeight:600,color:"#111827"}}>{v}</div></div>
        ))}
        <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#9CA3AF",fontWeight:600}}>เหตุผล</div><div style={{fontSize:14,color:"#374151"}}>{sel.reason}</div></div>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{fontSize:13,fontWeight:600,color:"#374151",display:"block",marginBottom:5}}>หมายเหตุ Admin</label>
        <textarea rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="ระบุหมายเหตุ..."
          style={{width:"100%",padding:"9px 12px",border:"1.5px solid #D1D5DB",borderRadius:8,fontSize:14,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
      </div>
      <button onClick={()=>printOTForm(sel)} style={{width:"100%",background:"#1E3A5F",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:10}}>
        🖨️ พิมพ์ฟอร์ม OT
      </button>
      {sel.status==="pending"?<div style={{display:"flex",gap:8}}>
        <button onClick={()=>doAction("approved")} disabled={upd} style={{flex:1,background:upd?"#9CA3AF":"#10B981",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:15,fontWeight:700,cursor:"pointer"}}>{upd?"⏳...":"✅ อนุมัติ"}</button>
        <button onClick={()=>doAction("rejected")} disabled={upd} style={{flex:1,background:upd?"#9CA3AF":"#EF4444",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:15,fontWeight:700,cursor:"pointer"}}>{upd?"⏳...":"❌ ไม่อนุมัติ"}</button>
      </div>:<div style={{display:"flex",gap:8}}>
        <button onClick={()=>doAction("pending")} style={{flex:1,background:"#F59E0B",color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer"}}>↩️ คืนสถานะ</button>
        <button onClick={()=>{setSel(null);setNote("");}} style={{flex:1,background:"#F3F4F6",color:"#374151",border:"none",borderRadius:8,padding:"11px",fontSize:14,cursor:"pointer"}}>ปิด</button>
      </div>}
    </Modal>}
  </div>;
}

function App() {
  const [tab,setTab]=useState("form");
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const load=async()=>{setLoading(true);setError("");try{setRecords(await fetchRecs());}catch(e){setError(e.message);}setLoading(false);};
  useEffect(()=>{if(tab==="status"||tab==="admin")load();},[tab]);
  const handleSubmit=async(rec)=>{const c=await createRec(rec);setRecords(p=>[c,...p]);};
  const handleUpdate=async(aid,status,note)=>{const u=await updateRec(aid,status,note);setRecords(p=>p.map(r=>r.airtableId===aid?{...r,...u}:r));};
  const tabs=[{id:"form",label:"📝 ยื่นคำขอ OT"},{id:"status",label:"🔍 ตรวจสอบ"},{id:"admin",label:"⚙️ Admin"}];
  return <div style={{fontFamily:"'Sarabun','Noto Sans Thai',sans-serif",background:"#F0F4F8",minHeight:"100vh"}}>
    <div style={{background:"linear-gradient(135deg,#0F766E 0%,#1E3A5F 100%)",padding:"20px 24px 0",boxShadow:"0 4px 20px rgba(0,0,0,0.15)"}}>
      <div style={{maxWidth:760,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <div style={{width:42,height:42,background:"rgba(255,255,255,0.15)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⏰</div>
          <div>
            <h1 style={{margin:0,color:"#fff",fontSize:20,fontWeight:800,lineHeight:1.2}}>ระบบบันทึก OT</h1>
            <p style={{margin:0,color:"rgba(255,255,255,0.65)",fontSize:13}}>GKN Driveline • HRM-01-001</p>
          </div>
        </div>
        <div style={{display:"flex",gap:4}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"9px 18px",border:"none",borderRadius:"8px 8px 0 0",fontSize:13,fontWeight:600,cursor:"pointer",background:tab===t.id?"#fff":"transparent",color:tab===t.id?"#0F766E":"rgba(255,255,255,0.75)"}}>
            {t.label}
          </button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:760,margin:"0 auto",padding:20}}>
      {error&&<div style={{background:"#FEE2E2",color:"#991B1B",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>⚠️ {error}</span>
        <button onClick={load} style={{background:"none",border:"none",color:"#991B1B",cursor:"pointer",textDecoration:"underline",fontSize:13}}>ลองใหม่</button>
      </div>}
      <div style={{background:"#fff",borderRadius:14,padding:"24px 26px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
        {tab==="form"&&<EmployeeForm onSubmit={handleSubmit}/>}
        {tab==="status"&&<StatusCheck records={records} loading={loading}/>}
        {tab==="admin"&&<AdminPanel records={records} loading={loading} onUpdate={handleUpdate}/>}
      </div>
      <p style={{textAlign:"center",color:"#CBD5E1",fontSize:11,marginTop:14}}>💾 GKN Driveline OT System • Powered by Airtable</p>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
